<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhakti Sangam</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    
</head>

<body>

    <!-- TOP BAR -->
    <div id="topbar">
        <div class="top-left">
            <span class="om">ॐ</span>
            <h1>Bhakti Sangam</h1>
        </div>
        <div class="top-center">
            <input type="text" id="yt-search" placeholder="Search 'Lord Shiva songs' or 'Telugu patalu'..." />
            <button id="yt-search-btn">🔍</button>
        </div>
        <div class="top-right">
            <span id="greeting"></span>
        </div>
    </div>

    <!-- MAIN -->
    <div id="main">

        <!-- SIDEBAR -->
        <div id="sidebar">
            <div id="sidebar-title">Morning Playlist</div>
            <div id="song-list"></div>
        </div>

        <!-- CENTER PANEL -->
        <div id="center">
            <div id="deity-art">🪔</div>
            
            <button id="back-to-results" onclick="goBackToResults()">← Back to Results</button>
            <div id="yt-player-container" style="display:none; width: 100%; max-width: 500px; height: 280px; border-radius: 12px; margin-bottom: 1.5rem; position: relative; z-index: 1; box-shadow: 0 0 30px rgba(255, 107, 0, 0.2); overflow: hidden;">
                <div id="yt-player"></div>
            </div>

            <!-- YouTube Search Results Viewer -->
            <div id="search-results-container"></div>
            
            <div id="now-title">Bhakti Sangam</div>
            <div id="now-sub">Select a song to begin your morning prayer</div>
            <div class="now-tags">
                <span class="tag">#Devotional</span>
                <span class="tag">#Morning</span>
            </div>
            <div id="idle-msg">🙏 May your morning be blessed</div>
        </div>

        <!-- RIGHT PANEL / AI PANDIT -->
        <div id="ai-sidebar">
            <div id="ai-header">
                <span>📿</span>
                <span>AI Pandit</span>
            </div>
            
            <div id="chat-history">
                <div class="msg ai">Pranam. I am your AI Pandit. How can I assist you in your morning prayers today?</div>
            </div>

            <div id="quick-prompts"></div>

            <div id="chat-input-area">
                <div class="chat-input-row">
                    <input type="text" id="chat-input" placeholder="Ask AI Pandit..." autocomplete="off"/>
                    <button id="send-btn">➤</button>
                </div>
            </div>
        </div>

    </div>

    <!-- BOTTOM PLAYER BAR -->
    <div id="player-bar">
        <div id="bar-info">
            <div id="bar-thumb">🪔</div>
            <div>
                <div id="bar-title">No song selected</div>
                <div id="bar-cat">—</div>
            </div>
        </div>

        <div id="bar-center">
            <div class="controls">
                <button class="ctrl" id="prev-btn">⏮</button>
                <button class="ctrl" id="play-btn">▶</button>
                <button class="ctrl" id="next-btn">⏭</button>
            </div>
            <div class="progress-row">
                <span class="time" id="t-curr">0:00</span>
                <div id="progress-track">
                    <div id="progress-fill"></div>
                </div>
                <span class="time" id="t-total">0:00</span>
            </div>
        </div>

        <div id="bar-right">
            <span>🔔</span>
            <input type="range" id="vol" min="0" max="1" step="0.05" value="0.8" />
        </div>
    </div>

    <audio id="audio"></audio>

    <!-- Load YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script src="script.js"></script>

</body>
</html>
